<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration | FutureHacks</title>
  <meta name="description" content="FutureHacks registration is coming soon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Karla:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="shortcut icon" href="assets/favicon.png">
  <meta name="theme-color" content="#0f172a">
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
  <style>
    .status-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .status-content {
      max-width: 560px;
    }
    .status-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 900;
      color: var(--accent-strong);
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }
    .status-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .status-text {
      color: var(--text-secondary);
      margin-bottom: 40px;
      max-width: 42ch;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main class="status-page">
    <div class="status-content">
      <div class="status-code">Coming Soon!</div>
      <p class="status-text">Registration for FutureHacks is not open yet. Check back soon for the sign-up link and event updates.</p>
      <a href="/" class="btn-primary">Return to Home</a>
    </div>
  </main>
</body>
</html>
