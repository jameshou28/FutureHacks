<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration | FutureHacks 2026</title>
  <meta name="description" content="FutureHacks registration is coming soon.">
  <meta name="author" content="James Hou and Arun Damodaran">
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://futurehacks.techshareproject.org/registration">

  <!-- Open Graph / Facebook / Discord / LinkedIn -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="FutureHacks">
  <meta property="og:title" content="Registration | FutureHacks 2026">
  <meta property="og:description" content="FutureHacks registration is coming soon.">
  <meta property="og:url" content="https://futurehacks.techshareproject.org/registration">
  <meta property="og:image" content="https://futurehacks.techshareproject.org/assets/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="FutureHacks — Build the city of tomorrow, today.">
  <meta property="og:locale" content="en_US">

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Registration | FutureHacks 2026">
  <meta name="twitter:description" content="FutureHacks registration is coming soon.">
  <meta name="twitter:image" content="https://futurehacks.techshareproject.org/assets/og-image.jpg">
  <meta name="twitter:image:alt" content="FutureHacks — Build the city of tomorrow, today.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Karla:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="shortcut icon" href="assets/favicon.png">
  <meta name="theme-color" content="#0f172a">
  <!-- Vercel Web Analytics -->
  <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

  <!-- Built by James Hou and Arun Damodaran. -->
  <style>
    .status-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .status-content {
      max-width: 560px;
    }
    .status-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 7rem);
      font-weight: 900;
      color: var(--accent-text);
      line-height: 1;
      margin-bottom: 20px;
      letter-spacing: -0.05em;
    }
    .status-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn-secondary {
      display: inline-block;
      background: transparent;
      color: var(--green-dark);
      padding: 16px 40px;
      border-radius: 100px;
      border: 1.5px solid var(--border);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.01em;
      transition: var(--transition);
    }
    .btn-secondary:hover {
      border-color: var(--green-dark);
      transform: translateY(-2px);
    }
    .status-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .status-text {
      color: var(--text-secondary);
      margin-bottom: 40px;
      max-width: 42ch;
      margin-left: auto;
      margin-right: auto;
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main class="status-page">
    <div class="status-content">
      <div class="status-code">Register Now</div>
      <p class="status-text">Registration for FutureHacks is open on Devpost. Sign up to join the hackathon and get event updates.</p>
      <div class="status-actions">
        <a href="https://futurehacks.devpost.com" target="_blank" rel="noopener" class="btn-primary">Register on Devpost</a>
        <a href="/" class="btn-secondary">Return to Home</a>
      </div>
    </div>
  </main>
</body>
</html>
