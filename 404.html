<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | [HACKATHON NAME]</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Karla:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="favicon.svg">
  <meta name="theme-color" content="#0f172a">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }
    .error-content {
      max-width: 500px;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(6rem, 15vw, 10rem);
      font-weight: 900;
      color: var(--accent-strong);
      line-height: 1;
      margin-bottom: 24px;
      letter-spacing: -0.05em;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }
    .error-text {
      color: var(--text-secondary);
      margin-bottom: 40px;
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <main class="error-page">
    <div class="error-content">
      <div class="error-code">404</div>
      <h1 class="error-title">You've gone off-grid.</h1>
      <p class="error-text">The page you're looking for doesn't exist or has been moved to a different coordinate.</p>
      <a href="/" class="btn-primary">Return to Base</a>
    </div>
  </main>
</body>
</html>
